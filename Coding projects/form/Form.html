<!DOCTYPE html>
<html>
  <head>
    <style>
      table,td {
        border: 1px solid black;
        background-color: white;
        padding: 10px;
        vertical-align: top;
      }
      body {
        background-color: pink;
        text-align: center;
      }
    </style>
  </head>
  <body style="margin: 100px">
    <table align="center">
      <tr>
        <td>
          <form>
            <label for="fname"><b>First name:</b></label
            ><br />
            <input type="text" id="fname" name="fname" /><br /><br />

            <label for="lname"><b>Last name:</b></label
            ><br />
            <input type="text" id="lname" name="lname" /><br /><br />

            <label for="sex"><b>Sex:</b></label
            ><br />
            <label for="male">Male</label>
            <input type="radio" id="male" name="sex" value="Male" />
            <label for="female">Female</label>
            <input
              type="radio"
              id="female"
              name="sex"
              value="Female"
            /><br /><br />

            <label for="location"><b>Your location:</b></label
            ><br />
            <select name="location" id="location">
              <option value="Select">Select</option>
              <option value="Cavite">Cavite</option>
              <option value="Laguna">Laguna</option>
              <option value="Bohol">Bohol</option>
              <option value="Iloilo">Iloilo</option></select
            ><br /><br />

            <label for="privacy"><b>Display your information?</b></label
            ><br />
            <label for="privacy-yes">Yes</label>
            <input type="radio" id="privacy-yes" name="privacy" value="Yes" />
            <label for="privacy-no">No</label>
            <input
              type="radio"
              id="privacy-no"
              name="privacy"
              value="No"
            /><br /><br />

            <label for="email">Enter your email:</label><br />
            <input type="email" id="email" name="email" /><br /><br />

            <label for="number">Enter your Phone Number:</label><br />
            <input type="text" id="number" name="number" /><br /><br />

            <label for="comments">Comments:</label><br />
            <textarea id="comments" name="comments"></textarea><br /><br />

            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />
          </form>
        </td>

        <td style="padding-top: 150px">
          <label for="information"><b>Information:</b></label
          ><br />
          <textarea
            id="information"
            name="information"
            style="width: 250px; height: 200px"
          ></textarea>
        </td>
      </tr>
    </table>
  </body>
</html>
